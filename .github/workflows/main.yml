name: Wellness App CI/CD Pipeline

# ============================================================
# DevOps Timeline:
# Developer Push → GitHub Trigger → GitHub Actions Pipeline
# → Maven Build → Docker Image Build → Docker Compose Deploy
# → Application Running
# ============================================================

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main

env:
  JAVA_VERSION: '21'
  DOCKER_REGISTRY: docker.io
  IMAGE_PREFIX: wellness

jobs:
  # ── Job 1: Build & Test All Microservices ─────────────────
  build-and-test:
    name: 🔨 Maven Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: 🔨 Build user-service
        run: mvn clean package -DskipTests -B
        working-directory: ./user-service

      - name: 🔨 Build activity-service
        run: mvn clean package -DskipTests -B
        working-directory: ./activity-service

      - name: 🔨 Build session-service
        run: mvn clean package -DskipTests -B
        working-directory: ./session-service

      - name: 📦 Upload user-service artifact
        uses: actions/upload-artifact@v4
        with:
          name: user-service-jar
          path: user-service/target/*.jar
          retention-days: 1

      - name: 📦 Upload activity-service artifact
        uses: actions/upload-artifact@v4
        with:
          name: activity-service-jar
          path: activity-service/target/*.jar
          retention-days: 1

      - name: 📦 Upload session-service artifact
        uses: actions/upload-artifact@v4
        with:
          name: session-service-jar
          path: session-service/target/*.jar
          retention-days: 1

  # ── Job 2: Build Frontend ──────────────────────────────────
  build-frontend:
    name: ⚛️ React Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install Dependencies
        run: npm ci
        working-directory: ./frontend

      - name: 🏗️ Build React App
        run: npm run build
        working-directory: ./frontend
        env:
          CI: false
          REACT_APP_API_URL: ''

      - name: 📦 Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 1

  # ── Job 3: Docker Image Build & Push ──────────────────────
  docker-build:
    name: 🐳 Docker Image Build
    runs-on: ubuntu-latest
    needs: [build-and-test, build-frontend]

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔑 Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build user-service Docker image (from Dockerfile)
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          dockerfile: ./user-service/Dockerfile
          push: false
          tags: |
            wellness/user-service:latest
            wellness/user-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🐳 Build activity-service Docker image (from Dockerfile)
        uses: docker/build-push-action@v5
        with:
          context: ./activity-service
          dockerfile: ./activity-service/Dockerfile
          push: false
          tags: |
            wellness/activity-service:latest
            wellness/activity-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🐳 Build session-service Docker image (from Dockerfile)
        uses: docker/build-push-action@v5
        with:
          context: ./session-service
          dockerfile: ./session-service/Dockerfile
          push: false
          tags: |
            wellness/session-service:latest
            wellness/session-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 📥 Pull MongoDB from DockerHub (DockerHub image #1)
        run: docker pull mongo:7.0

      - name: 📥 Pull Nginx from DockerHub (DockerHub image #2)
        run: docker pull nginx:alpine

      - name: 📋 List Docker Images
        run: docker images

  # ── Job 4: Integration Test with Docker Compose ───────────
  integration-test:
    name: 🧪 Docker Compose Integration Test
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📥 Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/

      - name: 🔧 Create .env file
        run: |
          cat > .env << 'EOF'
          JWT_SECRET=WellnessAppSuperSecretKeyForJWTTokenGeneration2024!
          JWT_EXPIRATION=86400000
          CORS_ORIGINS=http://localhost:3000,http://localhost:80
          EOF

      - name: 🚀 Start all services with Docker Compose
        run: docker compose up -d --build
        timeout-minutes: 10

      - name: ⏳ Wait for services to be healthy
        run: |
          echo "Waiting for services to start..."
          sleep 60

      - name: 🏥 Health Check - User Service
        run: |
          curl -f http://localhost:8081/api/users/health || \
          (echo "User service health check failed" && docker compose logs user-service && exit 1)

      - name: 🏥 Health Check - Activity Service
        run: |
          curl -f http://localhost:8082/api/activities/health || \
          (echo "Activity service health check failed" && docker compose logs activity-service && exit 1)

      - name: 🏥 Health Check - Session Service
        run: |
          curl -f http://localhost:8083/api/sessions/health || \
          (echo "Session service health check failed" && docker compose logs session-service && exit 1)

      - name: 🏥 Health Check - Nginx Gateway
        run: |
          curl -f http://localhost/health || \
          (echo "Nginx health check failed" && docker compose logs nginx && exit 1)

      - name: 🧪 API Test - Get Activities
        run: |
          RESPONSE=$(curl -s http://localhost:8082/api/activities/)
          echo "Activities response: $RESPONSE"
          echo "$RESPONSE" | grep -q '\[' && echo "✅ Activities API working" || echo "⚠️ Activities API returned unexpected response"

      - name: 📋 Show Container Status
        if: always()
        run: docker compose ps

      - name: 📋 Show Container Logs (on failure)
        if: failure()
        run: docker compose logs --tail=50

      - name: 🛑 Stop all services
        if: always()
        run: docker compose down -v

  # ── Job 5: Deploy (on main branch only) ───────────────────
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔑 Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build & Push user-service
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          push: ${{ secrets.DOCKERHUB_USERNAME != '' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wellness-user-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/wellness-user-service:${{ github.sha }}
        continue-on-error: true

      - name: 🐳 Build & Push activity-service
        uses: docker/build-push-action@v5
        with:
          context: ./activity-service
          push: ${{ secrets.DOCKERHUB_USERNAME != '' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wellness-activity-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/wellness-activity-service:${{ github.sha }}
        continue-on-error: true

      - name: 🐳 Build & Push session-service
        uses: docker/build-push-action@v5
        with:
          context: ./session-service
          push: ${{ secrets.DOCKERHUB_USERNAME != '' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wellness-session-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/wellness-session-service:${{ github.sha }}
        continue-on-error: true

      - name: ✅ Deployment Summary
        run: |
          echo "============================================"
          echo "🎉 DEPLOYMENT PIPELINE COMPLETE!"
          echo "============================================"
          echo "✅ Maven Build: PASSED"
          echo "✅ Docker Images Built: PASSED"
          echo "✅ Integration Tests: PASSED"
          echo "✅ Images Pushed to DockerHub"
          echo ""
          echo "📦 Docker Images:"
          echo "  1. wellness/user-service (Custom Dockerfile)"
          echo "  2. wellness/activity-service (Custom Dockerfile)"
          echo "  3. wellness/session-service (Custom Dockerfile)"
          echo "  4. mongo:7.0 (DockerHub)"
          echo "  5. nginx:alpine (DockerHub)"
          echo ""
          echo "🌐 Services:"
          echo "  - User Service:     http://localhost:8081"
          echo "  - Activity Service: http://localhost:8082"
          echo "  - Session Service:  http://localhost:8083"
          echo "  - Nginx Gateway:    http://localhost:80"
          echo "  - MongoDB:          localhost:27017"
          echo "============================================"
