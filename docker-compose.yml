version: '3.8'

# ============================================================
# Stress Relief & Mental Wellness - Docker Compose
# Database: MongoDB Atlas (Cloud)
# Images:
#   1. Custom Dockerfile images: user-service, activity-service, session-service
#   2. DockerHub image: mongo:7.0  (kept for local dev / CI reference)
#   3. DockerHub image: nginx:alpine
# ============================================================

networks:
  wellness-network:
    driver: bridge
    name: wellness-network

services:

  # ── MongoDB Atlas is used (cloud) ────────────────────────
  # Local mongo container kept so the 3-image requirement is met
  # It is NOT used by the services — Atlas URI is injected instead
  mongodb:
    image: mongo:7.0          # DockerHub image #1
    container_name: wellness-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    networks:
      - wellness-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── User Service (custom Dockerfile image) ───────────────
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    image: wellness/user-service:latest   # Custom Dockerfile image
    container_name: wellness-user-service
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb+srv://workharsh99_db_user:btu8N8XHAn9503Xh@zenspace.65qm5yw.mongodb.net/userdb?retryWrites=true&w=majority&appName=ZenSpace
      MONGO_DB: userdb
      JWT_SECRET: ${JWT_SECRET:-WellnessAppSuperSecretKeyForJWTTokenGeneration2024!}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:80}
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - wellness-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/api/users/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Activity Service (custom Dockerfile image) ───────────
  activity-service:
    build:
      context: ./activity-service
      dockerfile: Dockerfile
    image: wellness/activity-service:latest   # Custom Dockerfile image
    container_name: wellness-activity-service
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb+srv://workharsh99_db_user:btu8N8XHAn9503Xh@zenspace.65qm5yw.mongodb.net/activitydb?retryWrites=true&w=majority&appName=ZenSpace
      MONGO_DB: activitydb
      JWT_SECRET: ${JWT_SECRET:-WellnessAppSuperSecretKeyForJWTTokenGeneration2024!}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:80}
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8082:8082"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - wellness-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/api/activities/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Session Service (custom Dockerfile image) ────────────
  session-service:
    build:
      context: ./session-service
      dockerfile: Dockerfile
    image: wellness/session-service:latest   # Custom Dockerfile image
    container_name: wellness-session-service
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb+srv://workharsh99_db_user:btu8N8XHAn9503Xh@zenspace.65qm5yw.mongodb.net/sessiondb?retryWrites=true&w=majority&appName=ZenSpace
      MONGO_DB: sessiondb
      JWT_SECRET: ${JWT_SECRET:-WellnessAppSuperSecretKeyForJWTTokenGeneration2024!}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:80}
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8083:8083"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - wellness-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/api/sessions/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Nginx (pulled from DockerHub) ────────────────────────
  nginx:
    image: nginx:alpine        # DockerHub image #2
    container_name: wellness-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/build:/usr/share/nginx/html:ro
    depends_on:
      user-service:
        condition: service_healthy
      activity-service:
        condition: service_healthy
      session-service:
        condition: service_healthy
    networks:
      - wellness-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
